
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>出欠入力（匿名版）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#0f1117;color:#e8e8e8;min-height:100vh;padding:0 0 60px;}
.wrap{max-width:500px;margin:0 auto;padding:12px 14px;}
.hdr{padding:calc(env(safe-area-inset-top)+16px) 0 16px;}
.hdr-sub{font-family:monospace;font-size:11px;color:#4ade80;letter-spacing:3px;margin-bottom:4px;}
.hdr-title{font-size:24px;font-weight:800;color:#fff;}
.card{background:#1a1d27;border:1px solid #2a2d3a;border-radius:16px;padding:20px;margin-bottom:14px;}
.card-label{font-size:10px;color:#6b7280;letter-spacing:2px;margin-bottom:16px;font-family:monospace;font-weight:700;}
.field-label{font-size:12px;color:#9ca3af;display:block;margin-bottom:8px;font-weight:600;}
.date-input{width:100%;background:#0f1117;border:2px solid #374151;border-radius:12px;padding:14px 16px;color:#e8e8e8;font-size:18px;font-weight:700;outline:none;font-family:inherit;}
.date-display{margin-top:10px;padding:12px 16px;background:#0d2818;border:1px solid #166534;border-radius:12px;font-size:16px;font-weight:700;color:#4ade80;display:none;}
.legend{display:flex;gap:12px;font-size:12px;color:#6b7280;margin-bottom:14px;}
.dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle;}
.cnt-row{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
.cnt-btn{width:44px;height:44px;border-radius:12px;border:1px solid #374151;background:#0f1117;color:#e8e8e8;font-size:24px;cursor:pointer;}
.cnt-val{font-size:20px;font-weight:800;color:#fff;min-width:30px;text-align:center;}
.period-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.period-num{width:34px;height:34px;border-radius:8px;background:#374151;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#9ca3af;flex-shrink:0;}
.subj-sel{flex:1;background:#0f1117;border:1px solid #374151;border-radius:10px;padding:10px 12px;color:#e8e8e8;font-size:15px;outline:none;}
.attend-btn{padding:10px 0;border-radius:10px;border:1px solid #374151;background:#0f1117;color:#6b7280;font-size:12px;font-weight:700;cursor:pointer;width:82px;text-align:center;}
.attend-btn.absent{border-color:#ef4444;background:#2d1515;color:#ef4444;}
.attend-btn.none{border-color:#4b2d72;background:#1a1520;color:#a78bfa;}
.reason-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.reason-btn{padding:12px 18px;border-radius:22px;border:1px solid #374151;background:#0f1117;color:#9ca3af;font-size:14px;font-weight:600;cursor:pointer;}
.reason-btn.active{border-color:#4ade80;background:#0d2818;color:#4ade80;}
.note-input{width:100%;background:#0f1117;border:2px solid #374151;border-radius:12px;padding:14px 16px;color:#e8e8e8;font-size:16px;outline:none;}
.output-box{background:#0f1117;border:1px solid #1f2937;border-radius:12px;padding:14px;font-size:11px;font-family:monospace;color:#6ee7b7;white-space:pre;overflow-x:auto;line-height:1.8;}
.copy-btn{width:100%;padding:18px;border-radius:14px;border:none;background:#15803d;color:#fff;font-size:17px;font-weight:800;cursor:pointer;margin-top:14px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-sub">SECURE SYSTEM</div>
    <div class="hdr-title">出欠入力フォーム</div>
  </div>

  <div class="card">
    <div class="card-label">STEP 1 &nbsp;日付</div>
    <input type="date" id="dateInput" class="date-input" onchange="onDateChange()">
    <div id="dateDisplay" class="date-display"></div>
  </div>

  <div id="timetableCard" class="card">
    <div class="card-label">STEP 2 &nbsp;時間割・出欠</div>
    <div class="legend">
      <span><span class="dot" style="background:#374151"></span>参加</span>
      <span><span class="dot" style="background:#ef4444"></span>不参加</span>
      <span><span class="dot" style="background:#4b2d72"></span>なし</span>
    </div>
    <div class="cnt-row">
      <span class="field-label" style="margin:0">時限数</span>
      <button class="cnt-btn" onclick="changePeriod(-1)">−</button>
      <div class="cnt-val" id="periodVal">6</div>
      <button class="cnt-btn" onclick="changePeriod(1)">＋</button>
    </div>
    <div id="periodList"></div>
  </div>

  <div class="card">
    <div class="card-label">STEP 3 &nbsp;理由・備考</div>
    <label class="field-label">区分</label>
    <div class="reason-wrap" id="reasonBtns"></div>
    <label class="field-label" style="margin-top:10px;">備考（任意）</label>
    <input type="text" id="noteInput" class="note-input" placeholder="例: 通院、模試など" oninput="updateOutput()">
  </div>

  <div id="outputCard" class="card" style="display:none">
    <div class="card-label">OUTPUT (TSV)</div>
    <div id="outputBox" class="output-box"></div>
    <button class="copy-btn" onclick="doCopy()">コピーする</button>
  </div>
</div>

<script>
const SUBJECTS=['現代','言語','地理','歴史','数I','数A','化学','物','体育','保健','芸','コミ','論','情','探求','LHR'];
const DAYS=['日','月','火','水','木','金','土'];
const TT={
  月:{1:'現代',2:'化学',3:'コミ',4:'歴史',5:'体育',6:'情'},
  火:{1:'芸',2:'芸',3:'数A',4:'論',5:'現代',6:'数I',7:'LHR'},
  水:{1:'地理',2:'言語',3:'歴史',4:'数I',5:'数A',6:'探求',7:'探求'},
  木:{1:'言語',2:'化学',3:'情',4:'地理',5:'体育',6:'物'},
  金:{1:'コミ',2:'物',3:'論',4:'保健',5:'数I',6:'コミ'}
};
const REASONS=['出席','欠席','遅刻','早退','保健室','その他'];
var periodCount=6, periodData={}, reason='出席', selectedDow='';

window.onload = function(){
  var today=new Date();
  document.getElementById('dateInput').value=today.toISOString().split('T')[0];
  onDateChange();
};

function onDateChange(){
  var val=document.getElementById('dateInput').value;
  var d=new Date(val.replace(/-/g,'/')+' 00:00:00');
  selectedDow=DAYS[d.getDay()];
  document.getElementById('dateDisplay').textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+selectedDow+'）';
  document.getElementById('dateDisplay').style.display='block';
  var tt=TT[selectedDow]||{};
  periodCount=Object.keys(tt).length||6;
  document.getElementById('periodVal').textContent=periodCount;
  periodData={};
  for(var p=1;p<=8;p++) periodData[p]={subj:tt[p]||'',state:tt[p]?0:2};
  renderTimetable(); updateReasonSection(); updateOutput();
}

function changePeriod(d){
  var n=periodCount+d; if(n<1||n>8)return;
  periodCount=n; document.getElementById('periodVal').textContent=n;
  renderTimetable(); updateOutput();
}

function renderTimetable(){
  var html='';
  for(var p=1;p<=periodCount;p++){
    var d=periodData[p]||(periodData[p]={subj:'',state:0});
    var btnCls='attend-btn'+(d.state===1?' absent':d.state===2?' none':'');
    var btnLabel=d.state===0?'○参加':d.state===1?'×不参加':'―なし';
    var opts='<option value="">科目</option>'+SUBJECTS.map(s=>`<option value="${s}" ${d.subj===s?'selected':''}>${s}</option>`).join('');
    html+=`<div class="period-row"><div class="period-num">${p}</div><select class="subj-sel" onchange="periodData[${p}].subj=this.value;updateOutput()">${opts}</select><button class="${btnCls}" onclick="cycleState(${p})">${btnLabel}</button></div>`;
  }
  document.getElementById('periodList').innerHTML=html;
}

function cycleState(p){
  periodData[p].state=(periodData[p].state+1)%3;
  renderTimetable(); updateOutput();
}

function updateReasonSection(){
  document.getElementById('reasonBtns').innerHTML=REASONS.map(r=>`<button class="reason-btn ${r===reason?'active':''}" onclick="reason='${r}';updateReasonSection();updateOutput()">${r}</button>`).join('');
}

function updateOutput(){
  var dateVal=document.getElementById('dateInput').value;
  if(!dateVal){document.getElementById('outputCard').style.display='none';return;}
  var d=new Date(dateVal.replace(/-/g,'/')+' 00:00:00');
  var counts={}; SUBJECTS.forEach(s=>counts[s]=0);
  for(var p=1;p<=periodCount;p++) if(periodData[p].state===1 && periodData[p].subj) counts[periodData[p].subj]++;
  var row=[reason,`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`,selectedDow].concat(SUBJECTS.map(s=>counts[s])).concat([document.getElementById('noteInput').value]);
  document.getElementById('outputBox').textContent=row.join(' | ');
  document.getElementById('outputCard').dataset.tsv=row.join('\t');
  document.getElementById('outputCard').style.display='block';
}

function doCopy(){
  var t=document.getElementById('outputCard').dataset.tsv;
  var ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
  alert('コピーしました。スプレッドシートの該当行に貼り付けてください。');
}
</script>
</body>
</html>
