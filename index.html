<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出欠入力システム</title>
  <style>
    body { font-family: 'Hiragino Sans', sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
    .container { max-width: 400px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { text-align: center; color: #1a3a6b; font-size: 18px; margin-bottom: 20px; }
    label.title-label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; color: #555; margin-bottom: 5px;}
    select, input[type="date"], input[type="text"] { 
      width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px;
    }
    
    /* 時間割チェックボックス用のデザイン */
    .period-list { display: grid; gap: 8px; background: #f9f9f9; padding: 12px; border-radius: 8px; }
    .period-item { display: flex; align-items: center; background: #fff; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; transition: 0.2s; }
    .period-item:hover { background: #e8f4fd; border-color: #4A7CC4; }
    .period-item input[type="checkbox"] { width: 20px; height: 20px; margin: 0; cursor: pointer; }
    .period-item span { margin-left: 12px; font-weight: bold; font-size: 15px; cursor: pointer; flex-grow: 1;}
    .period-item span.period-num { color: #888; font-size: 13px; font-weight: normal; margin-right: 8px; margin-left: 0; width: 30px; }

    button { 
      margin-top: 25px; width: 100%; padding: 15px; background: #1a3a6b; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    button:disabled { background: #999; }
  </style>
</head>
<body>

<div class="container">
  <h2>出欠入力フォーム</h2>
  <form id="attendanceForm">
    
    <label class="title-label">出席番号</label>
    <select id="studentNo" required>
      <option value="">-- 番号を選択 --</option>
    </select>

    <label class="title-label">日付・曜日</label>
    <div style="display: flex; gap: 10px;">
      <input type="date" id="date" required style="flex: 2;">
      <select id="day" required style="flex: 1;">
        <option value="月">月</option><option value="火">火</option><option value="水">水</option>
        <option value="木">木</option><option value="金">金</option><option value="土">土</option><option value="日">日</option>
      </select>
    </div>

    <label class="title-label">理由</label>
    <select id="reason" required>
      <option value="欠席">欠席</option>
      <option value="出席停止">出席停止</option>
      <option value="遅刻">遅刻</option>
      <option value="早退">早退</option>
      <option value="保健室">保健室</option>
      <option value="その他">その他</option>
      <option value="公欠">公欠</option>
    </select>

    <label class="title-label">欠課した授業（チェックを入れてください）</label>
    <div id="period-container" class="period-list">
      </div>

    <label class="title-label">備考</label>
    <input type="text" id="note" placeholder="例: 病院受診のため">

    <button type="submit" id="submitBtn">送信する</button>
  </form>
</div>

<script>
  // 時間割データ
  const timetable = {
    "月": ["現代", "化学", "コミ", "歴史", "体育", "情"],
    "火": ["芸", "芸", "数A", "論", "現代", "数I", "LHR"],
    "水": ["地理", "言語", "歴史", "数I", "数A", "探求", "探求"],
    "木": ["言語", "化学", "情", "地理", "体育", "物"],
    "金": ["コミ", "物", "論", "保健", "数I", "コミ"],
    "土": [],
    "日": []
  };

  // 1〜39番のプルダウン生成
  const selectNo = document.getElementById('studentNo');
  for(let i=1; i<=39; i++) {
    let opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i + "番";
    selectNo.appendChild(opt);
  }

  // 曜日ごとの時間割（チェックボックス）を生成する機能
  function updateSubjectsDisplay() {
    const day = document.getElementById('day').value;
    const subjectsToday = timetable[day] || [];
    const container = document.getElementById('period-container');
    container.innerHTML = ''; 

    if(subjectsToday.length === 0) {
      container.innerHTML = '<div style="text-align: center; color: #999; padding: 10px;">授業がありません</div>';
      return;
    }

    subjectsToday.forEach((subject, index) => {
      const periodNum = index + 1;
      const label = document.createElement('label');
      label.className = 'period-item';
      label.innerHTML = `
        <span class="period-num">${periodNum}限</span>
        <input type="checkbox" class="subject-checkbox" value="${subject}">
        <span>${subject}</span>
      `;
      container.appendChild(label);
    });
  }

  // 手動で曜日を変更した時も表示を切り替える
  document.getElementById('day').addEventListener('change', updateSubjectsDisplay);

  // ★★★ 今回追加した新機能：日付を変えたら曜日も自動で変える ★★★
  const daysArray = ["日", "月", "火", "水", "木", "金", "土"];
  document.getElementById('date').addEventListener('change', function() {
    const selectedDate = new Date(this.value);
    if (!isNaN(selectedDate.getTime())) { // 正しい日付が入力されているか確認
      const dayIndex = selectedDate.getDay(); // 0(日)〜6(土)の数字を取得
      document.getElementById('day').value = daysArray[dayIndex]; // 曜日プルダウンを変更
      updateSubjectsDisplay(); // 時間割の表示も新しく更新
    }
  });

  // 日付と曜日を今日に自動セット＆初期表示
  const today = new Date();
  document.getElementById('date').valueAsDate = today;
  document.getElementById('day').value = daysArray[today.getDay()];
  updateSubjectsDisplay();

  // 送信処理
  document.getElementById('attendanceForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = "送信中...";

    const subjectCounts = {
      現代: 0, 言語: 0, 地理: 0, 歴史: 0, 数I: 0, 数A: 0, 化学: 0, 物: 0, 体育: 0, 保健: 0, 芸: 0, コミ: 0, 論: 0, 情: 0, 探求: 0, LHR: 0
    };

    document.querySelectorAll('.subject-checkbox:checked').forEach(cb => {
      if(subjectCounts[cb.value] !== undefined) {
        subjectCounts[cb.value]++;
      }
    });

    const data = {
      studentNo: document.getElementById('studentNo').value,
      date: document.getElementById('date').value.replace(/-/g, '/'),
      day: document.getElementById('day').value,
      reason: document.getElementById('reason').value,
      現代: subjectCounts['現代'],
      言語: subjectCounts['言語'],
      地理: subjectCounts['地理'],
      歴史: subjectCounts['歴史'],
      数I: subjectCounts['数I'],
      数A: subjectCounts['数A'],
      化学: subjectCounts['化学'],
      物: subjectCounts['物'],
      体育: subjectCounts['体育'],
      保健: subjectCounts['保健'],
      芸: subjectCounts['芸'],
      コミ: subjectCounts['コミ'],
      論: subjectCounts['論'],
      情: subjectCounts['情'],
      探求: subjectCounts['探求'],
      LHR: subjectCounts['LHR'],
      note: document.getElementById('note').value
    };

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbykdj7kOS7oJ37k5wflOaluvrJjsoNLTDGbNzOz8c81xRAI8KUsvsDsNnuUXGwjjdI/exec";

    fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(() => {
      alert("✓ スプレッドシートに記録しました！");
      btn.disabled = false;
      btn.textContent = "送信する";
      
      document.getElementById('studentNo').value = "";
      updateSubjectsDisplay();
      document.getElementById('note').value = "";
    })
    .catch(err => {
      alert("通信エラー: " + err);
      btn.disabled = false;
      btn.textContent = "送信する";
    });
  });
</script>

</body>
</html>
