<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出欠入力システム</title>
  <style>
    body { font-family: 'Hiragino Sans', sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
    .container { max-width: 400px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { text-align: center; color: #1a3a6b; font-size: 18px; margin-bottom: 20px; }
    label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; color: #555; }
    select, input[type="date"], input[type="number"], input[type="text"] { 
      width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px;
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-top: 5px; }
    .grid div { display: flex; align-items: center; justify-content: space-between; }
    .grid label { margin: 0; font-weight: normal; font-size: 14px; }
    .grid input { width: 60px; margin: 0; }
    button { 
      margin-top: 25px; width: 100%; padding: 15px; background: #1a3a6b; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    button:disabled { background: #999; }
  </style>
</head>
<body>

<div class="container">
  <h2>出欠入力フォーム</h2>
  <form id="attendanceForm">
    
    <label>出席番号</label>
    <select id="studentNo" required>
      <option value="">-- 番号を選択 --</option>
      </select>

    <label>日付・曜日</label>
    <div style="display: flex; gap: 10px;">
      <input type="date" id="date" required style="flex: 2;">
      <select id="day" required style="flex: 1;">
        <option value="月">月</option><option value="火">火</option><option value="水">水</option>
        <option value="木">木</option><option value="金">金</option><option value="土">土</option><option value="日">日</option>
      </select>
    </div>

    <label>理由</label>
    <select id="reason" required>
      <option value="欠席">欠席</option>
      <option value="出席停止">出席停止</option>
      <option value="遅刻">遅刻</option>
      <option value="早退">早退</option>
      <option value="保健室">保健室</option>
      <option value="その他">その他</option>
      <option value="公欠">公欠</option>
    </select>

    <label>欠課時数（該当科目のみ変更）</label>
    <div class="grid">
      <div><label>現代</label><input type="number" id="現代" min="0" value="0"></div>
      <div><label>言語</label><input type="number" id="言語" min="0" value="0"></div>
      <div><label>地理</label><input type="number" id="地理" min="0" value="0"></div>
      <div><label>歴史</label><input type="number" id="歴史" min="0" value="0"></div>
      <div><label>数I</label><input type="number" id="数I" min="0" value="0"></div>
      <div><label>数A</label><input type="number" id="数A" min="0" value="0"></div>
      <div><label>化学</label><input type="number" id="化学" min="0" value="0"></div>
      <div><label>物</label><input type="number" id="物" min="0" value="0"></div>
      <div><label>体育</label><input type="number" id="体育" min="0" value="0"></div>
      <div><label>保健</label><input type="number" id="保健" min="0" value="0"></div>
      <div><label>芸</label><input type="number" id="芸" min="0" value="0"></div>
      <div><label>コミ</label><input type="number" id="コミ" min="0" value="0"></div>
      <div><label>論</label><input type="number" id="論" min="0" value="0"></div>
      <div><label>情</label><input type="number" id="情" min="0" value="0"></div>
      <div><label>探求</label><input type="number" id="探求" min="0" value="0"></div>
      <div><label>LHR</label><input type="number" id="LHR" min="0" value="0"></div>
    </div>

    <label>備考</label>
    <input type="text" id="note" placeholder="例: 病院受診のため">

    <button type="submit" id="submitBtn">送信する</button>
  </form>
</div>

<script>
  // 1〜39番のプルダウン生成（個人情報を守るため番号のみ）
  const selectNo = document.getElementById('studentNo');
  for(let i=1; i<=39; i++) {
    let opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i + "番";
    selectNo.appendChild(opt);
  }

  // 日付と曜日を今日に自動セット
  const today = new Date();
  document.getElementById('date').valueAsDate = today;
  const days = ["日", "月", "火", "水", "木", "金", "土"];
  document.getElementById('day').value = days[today.getDay()];

  // 送信処理
  document.getElementById('attendanceForm').addEventListener('submit', function(e) {
    e.preventDefault(); // 画面の再読み込みを防ぐ
    
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = "送信中...";

    // データの収集
    const data = {
      studentNo: document.getElementById('studentNo').value,
      date: document.getElementById('date').value.replace(/-/g, '/'),
      day: document.getElementById('day').value,
      reason: document.getElementById('reason').value,
      現代: document.getElementById('現代').value,
      言語: document.getElementById('言語').value,
      地理: document.getElementById('地理').value,
      歴史: document.getElementById('歴史').value,
      数I: document.getElementById('数I').value,
      数A: document.getElementById('数A').value,
      化学: document.getElementById('化学').value,
      物: document.getElementById('物').value,
      体育: document.getElementById('体育').value,
      保健: document.getElementById('保健').value,
      芸: document.getElementById('芸').value,
      コミ: document.getElementById('コミ').value,
      論: document.getElementById('論').value,
      情: document.getElementById('情').value,
      探求: document.getElementById('探求').value,
      LHR: document.getElementById('LHR').value,
      note: document.getElementById('note').value
    };

    // 発行していただいた魔法のURL
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbykdj7kOS7oJ37k5wflOaluvrJjsoNLTDGbNzOz8c81xRAI8KUsvsDsNnuUXGwjjdI/exec";

    // Googleへ送信（no-corsが最大のポイント！）
    fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(() => {
      alert("✓ スプレッドシートに記録しました！");
      btn.disabled = false;
      btn.textContent = "送信する";
      
      // 連続で入力しやすいように一部をリセット
      document.getElementById('studentNo').value = "";
      document.querySelectorAll('.grid input').forEach(input => input.value = "0");
      document.getElementById('note').value = "";
    })
    .catch(err => {
      alert("通信エラー: " + err);
      btn.disabled = false;
      btn.textContent = "送信する";
    });
  });
</script>

</body>
</html>
